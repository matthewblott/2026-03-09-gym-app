default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/<%= Rails.env %>/tenant.sqlite3
    migrations_paths: db/migrate/tenant

# rails db:migrate:primary
    
  auth:
    <<: *default
    database: storage/<%= Rails.env %>/auth.sqlite3
    migrations_paths: db/migrate/auth

# For the shared database to create a migration file run the following
# rails generate migration CreateFoo --database=auth
#
# rails db:migrate:auth
